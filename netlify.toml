[build]
  command = "npm run build"
  publish = "dist"

# ── Security headers for all pages ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cache-Control = "no-store"

# ── Long-term immutable cache for fingerprinted assets ───────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTTPS redirect ────────────────────────────────────────────
[[redirects]]
  from = "http://jslcleaningservices.com/*"
  to = "https://jslcleaningservices.com/:splat"
  status = 301
  force = true

# ── SPA fallback — send all routes to index.html ─────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
